name: Rased Super Production Build 🚀

on:
  push:
    branches: [ "main", "master" ]

jobs:
  # 🌐 مهمة بناء الأندرويد والويب
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' } # 💉 تمت الترقية هنا
      - run: npm install
      - run: npm run build
      - run: npx cap sync
      - uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '21' }
      
      - name: Build Release App
        run: |
          cd android
          chmod +x gradlew # 💉 الحقنة الأمنية: إعطاء تصريح التشغيل للملف
          ./gradlew assembleRelease bundleRelease
        env:
          ANDROID_KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASS: ${{ secrets.KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - uses: actions/upload-artifact@v4
        with:
          name: Rased-Android-Bundle-AAB
          path: android/app/build/outputs/bundle/release/*.aab
          # 💉 الحقنة الجديدة: إضافة قسم شحن الـ APK للتحميل المباشر
      - name: 📲 Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Production-APK
          path: android/app/build/outputs/apk/release/*.apk

      - uses: actions/upload-artifact@v4
        with:
          name: Rased-Web-Deployment
          path: dist/

  # 🪟 مهمة بناء نسخة الويندوز
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' } # 💉 تمت الترقية هنا
      - run: npm install
      - run: npm run build
      - name: Build EXE
        run: npm run electron:build
      - uses: actions/upload-artifact@v4
        with:
          name: Rased-Windows-EXE
          path: release/*.exe

# 🍎 مهمة بناء نسخة الآيفون (الكود الذهبي)
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      - name: 📦 Install Dependencies & Build Web Project
        run: |
          npm install
          npm run build

      - name: 🍏 Create Fresh iOS Project
        run: |
          rm -rf ios
          npx cap add ios

      - name: 🎨 Generate App Icons Automatically
        run: npx @capacitor/assets generate --ios || true

      - name: ✍️ Set Arabic App Name (Smart Injection)
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName منظومة راصد" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleName منظومة راصد" ios/App/App/Info.plist || true

      - name: 🚀 Build IPA
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App -configuration Debug -sdk iphoneos CODE_SIGNING_ALLOWED=NO SYMROOT=$PWD/build build
          
          mkdir -p Payload
          cp -r build/Debug-iphoneos/App.app Payload/
          zip -r ../../Rased-Super.ipa Payload

      - name: 📲 Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Super-iOS-IPA
          path: Rased-Super.ipa
