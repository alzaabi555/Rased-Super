name: Build Android App (Signed APK & AAB)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Sync Android Platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      # 👈 رفعنا رقم الإصدار إلى 8 لكي يقبله متجر جوجل كتحديث جديد
      - name: Update Version and API
        run: |
          if [ -f "android/app/build.gradle" ]; then
            sed -i 's/versionCode [0-100]*/versionCode 10/g' android/app/build.gradle
            sed -i 's/versionName "[^"]*"/versionName "1.1.1"/g' android/app/build.gradle
          fi

      # 👈 الحقنة الجديدة: زرع التوافق مع أندرويد 15 (Edge-to-Edge)
      - name: 🛡️ Enforce MainActivity & Edge-To-Edge
        run: |
          echo "💉 Injecting MainActivity with Android 15 compatibility..."
          APP_ID=$(grep 'applicationId' android/app/build.gradle | awk -F '"' '{print $2}')
          DIR="android/app/src/main/java/$(echo $APP_ID | tr '.' '/')"
          mkdir -p $DIR
          cat <<EOF > $DIR/MainActivity.java
          package $APP_ID;
          
          import android.os.Bundle;
          import androidx.activity.EdgeToEdge;
          import com.getcapacitor.BridgeActivity;
          
          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  // تفعيل العرض حتى حافة الشاشة لتوافق Android 15
                  EdgeToEdge.enable(this);
              }
          }
          EOF
          echo "✅ MainActivity Patched!"

      # 👈 التعديل الجراحي: بناء النسختين بشكل منفصل لمنع تداخل الملفات (مشكلة الشاشة البيضاء)
      - name: Build Android Release (Safely Separated)
        run: |
          cd android
          chmod +x gradlew
          echo "🔨 Building APK for Huawei / Direct Install..."
          ./gradlew assembleRelease --stacktrace
          
          echo "🔨 Building AAB for Google Play Store..."
          ./gradlew bundleRelease --stacktrace

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Sign AAB
        uses: r0adkll/sign-android-release@v1
        id: sign_aab
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      # 👈 تسليم نسخة هواوي بالطريقة المضمونة لالتقاط الملف
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Teacher-Signed-APK
          path: android/app/build/outputs/apk/release/*.apk

      # 👈 تسليم نسخة جوجل بالطريقة المضمونة لالتقاط الملف
      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: Rased-Teacher-Signed-AAB
          path: android/app/build/outputs/bundle/release/*.aab
