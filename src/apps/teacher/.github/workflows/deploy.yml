name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ] # لضمان العمل سواء كان فرعك main أو master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
    # 💉 الحقنة الشاملة: تثبيت Vite + أدوات التصميم (Tailwind & PostCSS)
      - name: Force Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install vite @vitejs/plugin-react tailwindcss postcss autoprefixer --no-save --legacy-peer-deps
          
      # 💉 البناء باستخدام المسار الصحيح للمستودع الذي ظهر في رسالة الخطأ
      - name: Build project
        run: npx vite build --base=/-Build-iOS/
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
