name: Build iOS App (Unsigned IPA)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 👈 1. توحيد نسخة النود مع سيرفر الأندرويد
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 💉 المصل المضاد: تثبيت مكتبة vips لحل مشكلة مكتبة sharp مع سيرفرات أبل الحديثة
      - name: Install vips (Fix for sharp on Apple Silicon)
        run: brew install vips

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Assets
        run: npm run build

      # 👈 2. تنظيف وإعادة بناء منصة iOS
      - name: Sync/Repair iOS Platform
        run: |
          echo "🧹 Cleaning old iOS builds..."
          rm -rf ios
          echo "🍏 Creating fresh iOS platform..."
          npx cap add ios
          npx cap sync ios

      - name: Copy GoogleService-Info.plist to iOS
        run: |
          if [ -f "GoogleService-Info.plist" ]; then
            echo "📄 Found GoogleService-Info.plist, copying..."
            cp GoogleService-Info.plist ios/App/App/
          else
            echo "⚠️ GoogleService-Info.plist NOT found! Skipping..."
          fi

      - name: Generate App Icons
        run: npx capacitor-assets generate --ios || true

      - name: Inject Google URL Scheme
        run: |
          PLIST="ios/App/App/Info.plist"
          REVERSED_CLIENT_ID="com.googleusercontent.apps.87037584903-3uc4aeg3nc5lk3pu8crjbaad184bhjth"
          
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" $PLIST || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" $PLIST || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" $PLIST || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string $REVERSED_CLIENT_ID" $PLIST || true

      # 👈 3. حقن أذونات الكاميرا والصور باللغة العربية (مهم جداً لآبل)
      - name: Inject iOS Permissions
        run: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'يحتاج تطبيق الراصد للوصول للكاميرا لالتقاط صورة الطالب'" $PLIST || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'يحتاج تطبيق الراصد للوصول للمعرض لاختيار صورة الطالب'" $PLIST || true

      - name: Build Xcode Archive (Unsigned)
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                       -scheme App \
                       -configuration Release \
                       -destination 'generic/platform=iOS' \
                       -archivePath App.xcarchive \
                       archive \
                       CODE_SIGNING_ALLOWED=NO

      # 👈 4. تغليف التطبيق يدوياً لتخطي حماية آبل
      - name: Prepare IPA (Bypass Signing)
        run: |
          echo "📦 Packaging Unsigned IPA..."
          mkdir -p build/Payload
          cp -R App.xcarchive/Products/Applications/App.app build/Payload/
          cd build && zip -r ../Rased-iOS-Unsigned.ipa Payload/

      # 👈 5. تسليم الملف النهائي لكي يظهر في صفحة Github
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rased-iOS-Unsigned-IPA
          path: Rased-iOS-Unsigned.ipa
